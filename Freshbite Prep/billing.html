<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Freshbite Prep — Billing</title>
  <style>
    :root {
      --white: #ffffff;
      --green: #2e7d32;
      --green-soft: #edf7ed;
      --dark: #1f3620;
      --gray: #54585a;
      --shadow: 0 18px 50px rgba(46, 77, 50, 0.08);
    }

    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8faf8; color: var(--dark); }
    header { display: flex; justify-content: space-between; align-items: center; padding: 18px 32px; background: var(--white); border-bottom: 1px solid #e8ece8; position: sticky; top: 0; z-index: 20; }
    .brand h1 { margin: 0; font-size: 28px; color: var(--green); }
    nav a, nav button { text-decoration: none; color: var(--white); background: var(--green); border: none; border-radius: 999px; padding: 10px 18px; margin-left: 10px; font-weight: 600; cursor: pointer; transition: transform .2s ease, background .2s ease; }
    nav a:hover, nav button:hover { background: #27632a; transform: translateY(-1px); }
    .page-grid { display: grid; grid-template-columns: 260px 1fr; gap: 24px; padding: 28px 32px 40px; }
    .sidebar { background: var(--white); border-radius: 28px; padding: 24px; box-shadow: var(--shadow); position: sticky; top: 104px; align-self: start; display: flex; flex-direction: column; gap: 18px; }
    .sidebar h2 { margin: 0 0 10px; font-size: 18px; }
    .sidebar button { width: 100%; border-radius: 14px; border: 1px solid #e6ede6; background: var(--green-soft); color: var(--dark); padding: 14px 16px; text-align: left; font-weight: 600; cursor: pointer; }
    .sidebar button:hover { background: #e7f3e8; }
    .section-card { background: var(--white); border-radius: 28px; box-shadow: var(--shadow); padding: 28px; margin-bottom: 24px; }
    .section-card h2 { margin: 0; font-size: 2rem; }
    .section-card p { color: #5f655f; line-height: 1.8; }
    .billing-card { background: var(--white); border-radius: 28px; box-shadow: var(--shadow); padding: 28px; }
    .billing-card label { display: block; margin-top: 20px; color: #5f655f; font-weight: 600; }
    .billing-card input { width: 100%; padding: 16px 18px; margin-top: 8px; border: 1px solid #dfe7dd; border-radius: 14px; background: #fbfcfb; font-size: 1rem; }
    .billing-card button { margin-top: 26px; border: none; border-radius: 16px; padding: 16px 20px; background: var(--green); color: var(--white); font-size: 1rem; font-weight: 700; cursor: pointer; transition: background .2s ease; }
    .billing-card button:hover { background: #27632a; }
    .summary { display: grid; gap: 16px; margin-top: 18px; }
    .summary-item { background: var(--green-soft); border-radius: 18px; padding: 18px; display: flex; justify-content: space-between; align-items: center; }
    .summary-item strong { color: var(--dark); }
    .login-status { font-size: .95rem; color: #4b534d; padding: 14px 18px; background: #f4faf4; border-radius: 18px; display: inline-flex; align-items: center; gap: 10px; max-width: fit-content; }
    .hidden { display: none; }
    #side-drawer { position: fixed; right: -360px; top: 0; width: 360px; height: 100%; background: var(--white); box-shadow: -24px 0 80px rgba(38, 80, 40, 0.18); transition: right .35s ease; z-index: 30; padding: 32px 28px; display: flex; flex-direction: column; gap: 18px; }
    #side-drawer.open { right: 0; }
    #side-drawer h2 { margin: 0; color: var(--dark); font-size: 1.75rem; }
    #side-drawer label { color: #616b63; font-size: .95rem; margin-bottom: 6px; }
    #side-drawer input { width: 100%; border: 1px solid #dfe7dd; border-radius: 14px; padding: 14px 16px; font-size: 1rem; color: var(--dark); background: #fbfcfb; }
    #side-drawer button { width: 100%; border: none; border-radius: 14px; padding: 14px 16px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background .2s ease; }
    .primary { background: var(--green); color: var(--white); }
    .secondary { background: #eef4eb; color: var(--dark); }
    .secondary:hover { background: #e4ede2; }
    @media (max-width: 1080px) { .page-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <div class="brand"><h1>Freshbite Prep</h1></div>
    <nav>
      <a href="index.html">Home</a>
      <a href="meals.html">Meals</a>
      <a href="billing.html">Billing</a>
      <a href="plans.html">Plans</a>
      <button id="login-btn">Login</button>
    </nav>
  </header>

  <div class="page-grid">
    <aside class="sidebar">
      <h2>Billing flow</h2>
      <button id="diet-btn">Select Diet</button>
      <button id="weekly-btn">Choose Meals</button>
      <button id="delivery-btn">Enter Delivery</button>
      <button id="macros-btn">View Macros</button>
      <div id="status-box" class="login-status hidden"></div>
    </aside>

    <section>
      <div class="section-card">
        <h2>Billing & delivery</h2>
        <p>Securely add your payment details and confirm the address for delivery. We keep the experience simple and modern.</p>
      </div>

      <div class="billing-card">
        <label for="card-number">Card number</label>
        <input id="card-number" type="text" placeholder="1234 5678 9012 3456" />
        <label for="name">Cardholder name</label>
        <input id="name" type="text" placeholder="Jane Doe" />
        <label for="expiry">Expiry date</label>
        <input id="expiry" type="text" placeholder="MM / YY" />
        <label for="cvc">CVC</label>
        <input id="cvc" type="text" placeholder="123" />
        <button id="save-billing">Save payment</button>

        <div class="summary">
          <div class="summary-item"><strong>Next delivery</strong><span>Thursday, Apr 10</span></div>
          <div class="summary-item"><strong>Selected meals</strong><span>5 meals this week</span></div>
          <div class="summary-item"><strong>Estimated total</strong><span>$68.99</span></div>
        </div>
      </div>
    </section>
  </div>

  <div id="side-drawer">
    <h2>Member Login</h2>
    <label for="email">Email</label>
    <input id="email" type="email" placeholder="you@example.com" />
    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Password" />
    <button class="primary" id="login-submit">Sign in</button>
    <button class="secondary" id="close-drawer">Close</button>
  </div>

  <script>
    const drawer = document.getElementById('side-drawer');
    const loginBtn = document.getElementById('login-btn');
    const closeBtn = document.getElementById('close-drawer');
    const loginSubmit = document.getElementById('login-submit');
    const statusBox = document.getElementById('status-box');

    function setLoggedIn(email) { localStorage.setItem('freshbiteLoggedIn', email); updateLoginStatus(); drawer.classList.remove('open'); }
    function clearLogin() { localStorage.removeItem('freshbiteLoggedIn'); updateLoginStatus(); }
    function updateLoginStatus() {
      const email = localStorage.getItem('freshbiteLoggedIn');
      if (email) { statusBox.textContent = `Logged in as ${email}`; statusBox.classList.remove('hidden'); loginBtn.textContent = 'Logout'; } else { statusBox.classList.add('hidden'); loginBtn.textContent = 'Login'; }
    }

    loginBtn.addEventListener('click', () => { if (localStorage.getItem('freshbiteLoggedIn')) { clearLogin(); } else { drawer.classList.add('open'); } });
    closeBtn.addEventListener('click', () => drawer.classList.remove('open'));
    loginSubmit.addEventListener('click', () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!email || !password) { alert('Please fill in both email and password.'); return; }
      setLoggedIn(email);
    });

    document.getElementById('diet-btn').addEventListener('click', () => { window.location.href = 'meals.html#select'; });
    document.getElementById('weekly-btn').addEventListener('click', () => { window.location.href = 'meals.html'; });
    document.getElementById('delivery-btn').addEventListener('click', () => { window.location.href = 'billing.html'; });
    document.getElementById('macros-btn').addEventListener('click', () => { window.location.href = 'plans.html'; });

    updateLoginStatus();
  </script>
</body>
</html>
